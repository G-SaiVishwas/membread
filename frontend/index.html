<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronosMCP - Universal Memory Layer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 16px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            margin-top: 16px;
            padding: 16px;
            border-radius: 8px;
            background: #f5f5f5;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .token-display {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .context-display {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 8px;
            margin-top: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .full-width {
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 ChronosMCP</h1>
            <p>Universal Temporal-Aware Memory Layer for AI Agents</p>
        </div>

        <div class="main-grid">
            <!-- Authentication Card -->
            <div class="card">
                <h2>🔐 Authentication</h2>
                <div class="form-group">
                    <label for="tenant-id">Tenant ID</label>
                    <input type="text" id="tenant-id" placeholder="demo-tenant" value="demo-tenant">
                </div>
                <div class="form-group">
                    <label for="user-id">User ID</label>
                    <input type="text" id="user-id" placeholder="demo-user" value="demo-user">
                </div>
                <button onclick="generateToken()">Generate Token</button>
                <div id="token-result" class="result"></div>
            </div>

            <!-- Store Observation Card -->
            <div class="card">
                <h2>💾 Store Observation</h2>
                <div class="form-group">
                    <label for="observation">Observation</label>
                    <textarea id="observation" placeholder="Enter your observation here..."></textarea>
                </div>
                <button onclick="storeObservation()">Store</button>
                <div id="store-result" class="result"></div>
            </div>

            <!-- Recall Context Card -->
            <div class="card">
                <h2>🔍 Recall Context</h2>
                <div class="form-group">
                    <label for="query">Query</label>
                    <input type="text" id="query" placeholder="What do you want to recall?">
                </div>
                <div class="form-group">
                    <label for="max-tokens">Max Tokens</label>
                    <input type="number" id="max-tokens" value="2000" min="100" max="8000">
                </div>
                <button onclick="recallContext()">Recall</button>
                <div id="recall-result" class="result"></div>
            </div>

            <!-- Profile Card -->
            <div class="card">
                <h2>👤 User Profile</h2>
                <button onclick="getProfile()">Get Profile</button>
                <div id="profile-result" class="result"></div>
            </div>
        </div>

        <!-- Stats Card -->
        <div class="card full-width">
            <h2>📊 Session Stats</h2>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="stat-stored">0</div>
                    <div class="stat-label">Observations Stored</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-recalled">0</div>
                    <div class="stat-label">Contexts Recalled</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-tokens">0</div>
                    <div class="stat-label">Total Tokens</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-compressed">0</div>
                    <div class="stat-label">Compressions</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let currentToken = null;
        let stats = {
            stored: 0,
            recalled: 0,
            tokens: 0,
            compressed: 0
        };

        function updateStats() {
            document.getElementById('stat-stored').textContent = stats.stored;
            document.getElementById('stat-recalled').textContent = stats.recalled;
            document.getElementById('stat-tokens').textContent = stats.tokens;
            document.getElementById('stat-compressed').textContent = stats.compressed;
        }

        function showResult(elementId, message, isSuccess = true) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `result show ${isSuccess ? 'success' : 'error'}`;
        }

        async function generateToken() {
            const tenantId = document.getElementById('tenant-id').value;
            const userId = document.getElementById('user-id').value;

            try {
                const response = await fetch(`${API_BASE}/api/auth/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenant_id: tenantId, user_id: userId })
                });

                const data = await response.json();
                currentToken = data.token;

                showResult('token-result', 
                    `✅ Token generated successfully!\n\nToken: ${data.token.substring(0, 50)}...\n\nExpires in: ${data.expires_in_hours} hours`
                );
            } catch (error) {
                showResult('token-result', `❌ Error: ${error.message}`, false);
            }
        }

        async function storeObservation() {
            if (!currentToken) {
                showResult('store-result', '❌ Please generate a token first', false);
                return;
            }

            const observation = document.getElementById('observation').value;
            if (!observation) {
                showResult('store-result', '❌ Please enter an observation', false);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/memory/store`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({
                        observation: observation,
                        metadata: { source: 'web_ui', timestamp: new Date().toISOString() }
                    })
                });

                const data = await response.json();
                stats.stored++;
                updateStats();

                showResult('store-result',
                    `✅ ${data.message}\n\nObservation ID: ${data.observation_id}\nProvenance Hash: ${data.provenance_hash.substring(0, 16)}...\nNodes Created: ${data.nodes_created}\nConflicts Resolved: ${data.conflicts_resolved}`
                );

                document.getElementById('observation').value = '';
            } catch (error) {
                showResult('store-result', `❌ Error: ${error.message}`, false);
            }
        }

        async function recallContext() {
            if (!currentToken) {
                showResult('recall-result', '❌ Please generate a token first', false);
                return;
            }

            const query = document.getElementById('query').value;
            const maxTokens = parseInt(document.getElementById('max-tokens').value);

            if (!query) {
                showResult('recall-result', '❌ Please enter a query', false);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/memory/recall`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({
                        query: query,
                        max_tokens: maxTokens
                    })
                });

                const data = await response.json();
                stats.recalled++;
                stats.tokens += data.token_count;
                if (data.compressed) stats.compressed++;
                updateStats();

                showResult('recall-result',
                    `✅ Context retrieved!\n\nSources: ${data.sources.length}\nTokens: ${data.token_count}\nCompressed: ${data.compressed ? 'Yes' : 'No'}\n\n--- Context ---\n${data.context}`
                );
            } catch (error) {
                showResult('recall-result', `❌ Error: ${error.message}`, false);
            }
        }

        async function getProfile() {
            if (!currentToken) {
                showResult('profile-result', '❌ Please generate a token first', false);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/memory/profile`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                const data = await response.json();

                showResult('profile-result',
                    `✅ Profile retrieved!\n\nDisplay Name: ${data.display_name}\nTenant ID: ${data.tenant_id}\nUser ID: ${data.user_id}\nCreated: ${new Date(data.created_at).toLocaleString()}\nUpdated: ${new Date(data.updated_at).toLocaleString()}\n\nPreferences: ${JSON.stringify(data.preferences, null, 2)}`
                );
            } catch (error) {
                showResult('profile-result', `❌ Error: ${error.message}`, false);
            }
        }

        // Check API health on load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                console.log('✅ API is healthy:', data);
            } catch (error) {
                console.error('❌ API is not reachable:', error);
                alert('⚠️ Cannot connect to API. Make sure the backend is running on http://localhost:8000');
            }
        });
    </script>
</body>
</html>
